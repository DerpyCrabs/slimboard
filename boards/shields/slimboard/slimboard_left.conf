# Disable Battery Service (not needed)
CONFIG_BT_BAS=n
CONFIG_ZMK_BATTERY_REPORTING=n

# Increase BLE connection stability
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# More aggressive power saving on the battery-powered half
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=10000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000